<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SCORPION X | Enter the Realm</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================================
       SCORPION X – LOGIN.HTML STYLES
       Theme: Fire / Mortal Kombat / Dark Cyberpunk
       ============================================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --fire-orange: #FF4500;
      --fire-bright: #FF6600;
      --fire-dark: #8B0000;
      --gold: #FFD700;
      --gold-light: #FFEA00;
      --text-primary: #E9EDEF;
      --text-secondary: #A8A8A8;
      --glass-bg: rgba(10, 10, 10, 0.75);
      --fire-glow: 0 0 30px rgba(255, 69, 0, 0.4);
      --fire-glow-strong: 0 0 60px rgba(255, 69, 0, 0.8);
      --font-primary: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
      --transition-fast: 0.2s ease;
      --transition-medium: 0.4s ease;
      --transition-slow: 0.8s ease;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--black);
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow-y: auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ==================== SCROLLBAR ==================== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--black);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--fire-orange);
      border-radius: 10px;
    }

    /* ==================== BACKGROUND ==================== */
    .bg-fire {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at center, #1a0505 0%, #0a0a0a 70%);
    }

    .bg-fire::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(0deg, rgba(255, 69, 0, 0.08), transparent);
      animation: firePulse 3s ease-in-out infinite;
    }

    @keyframes firePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ==================== FIRE PARTICLES ==================== */
    #fireParticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ==================== CURSOR GLOW ==================== */
    .cursor-glow {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 69, 0, 0.25), transparent 70%);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
    }

    /* ==================== CONTAINER ==================== */
    .container {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 20px auto;
      padding: 20px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ==================== LOGO ==================== */
    .logo-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-container img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--fire-orange);
      box-shadow: var(--fire-glow);
      object-fit: cover;
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 20px rgba(255, 69, 0, 0.4); }
      100% { box-shadow: 0 0 50px rgba(255, 69, 0, 0.8); }
    }

    .logo-container h1 {
      font-family: var(--font-primary);
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--fire-orange), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
      letter-spacing: 3px;
    }

    .logo-container .subtitle {
      font-family: var(--font-primary);
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 4px;
    }

    /* ==================== GLASS CARD ==================== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 69, 0, 0.25);
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    /* ==================== FORM ELEMENTS ==================== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 69, 0, 0.25);
      padding: 14px 16px;
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font-body);
      transition: var(--transition-fast);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--fire-orange);
      box-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .form-group input.error {
      border-color: #ff4444;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.2);
    }

    .form-group input.success {
      border-color: #25D366;
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.2);
    }

    .form-group .input-icon {
      position: absolute;
      right: 16px;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: var(--transition-fast);
    }

    .form-group .input-icon.clickable {
      cursor: pointer;
    }

    .form-group .input-icon.clickable:hover {
      color: var(--gold);
    }

    /* ==================== CHECKBOX & OPTIONS ==================== */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 15px 0 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .options-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .options-row label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--fire-orange);
      cursor: pointer;
    }

    .options-row a {
      color: var(--fire-orange);
      text-decoration: none;
      font-size: 0.85rem;
      transition: var(--transition-fast);
    }

    .options-row a:hover {
      color: var(--gold);
      text-decoration: underline;
    }

    /* ==================== BUTTONS ==================== */
    .btn-fire {
      font-family: var(--font-primary);
      padding: 14px 35px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      transition: var(--transition-medium);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      color: var(--gold);
      box-shadow: var(--fire-glow);
    }

    .btn-fire:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: var(--fire-glow-strong);
    }

    .btn-fire:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ==================== DIVIDER ==================== */
    .divider {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ==================== SOCIAL BUTTONS ==================== */
    .social-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .social-btn:hover {
      border-color: var(--fire-orange);
      color: var(--gold);
      transform: translateY(-3px);
      box-shadow: var(--fire-glow);
    }

    /* ==================== REGISTER LINK ==================== */
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .register-link a {
      color: var(--fire-orange);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .register-link a:hover {
      color: var(--gold);
      text-decoration: underline;
    }

    /* ==================== MESSAGE ==================== */
    .message {
      margin-top: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      display: none;
    }

    .message.error {
      display: block;
      color: #ff6666;
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.2);
    }

    .message.success {
      display: block;
      color: #66ff66;
      background: rgba(37, 211, 102, 0.1);
      border: 1px solid rgba(37, 211, 102, 0.2);
    }

    .message.info {
      display: block;
      color: var(--gold);
      background: rgba(255, 215, 0, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    /* ==================== ANIMATED RING ==================== */
    .login-ring {
      position: relative;
      margin: 0 auto 10px;
      width: 100px;
      height: 100px;
    }

    .login-ring .ring {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--fire-orange);
      border-right-color: var(--gold);
      animation: spinRing 3s linear infinite;
    }

    .login-ring .ring:nth-child(2) {
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      animation-duration: 4s;
      animation-direction: reverse;
      border-top-color: var(--gold);
      border-right-color: var(--fire-dark);
    }

    @keyframes spinRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ==================== LOADING SPINNER ==================== */
    .loading-spinner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 0;
    }

    .loading-spinner.active {
      display: flex;
    }

    .loading-spinner .spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--fire-orange);
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 600px) {
      .container {
        padding: 10px;
        margin: 10px auto;
      }

      .glass-card {
        padding: 20px 15px;
      }

      .logo-container img {
        width: 65px;
        height: 65px;
      }

      .logo-container h1 {
        font-size: 1.6rem;
      }

      .social-buttons {
        gap: 10px;
      }

      .social-btn {
        width: 45px;
        height: 45px;
        font-size: 1rem;
      }

      .options-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }

    @media (max-width: 400px) {
      .glass-card {
        padding: 15px 12px;
      }

      .btn-fire {
        font-size: 0.85rem;
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

<!-- ==================== BACKGROUND ==================== -->
<div class="bg-fire"></div>
<canvas id="fireParticles"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ==================== CONTAINER ==================== -->
<div class="container">

  <!-- Logo -->
  <div class="logo-container">
    <div class="login-ring">
      <img src="https://files.catbox.moe/cam98u.jpg" alt="SCORPION X">
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h1>SCORPION X</h1>
    <div class="subtitle">⚔ ENTER THE REALM ⚔</div>
  </div>

  <!-- Glass Card -->
  <div class="glass-card">

    <!-- Email -->
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="youremail@gmail.com" autocomplete="email">
        <span class="input-icon" id="emailIcon"><i class="fas fa-envelope"></i></span>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="input-icon clickable" id="togglePassword"><i class="fas fa-eye"></i></span>
      </div>
    </div>

    <!-- Options -->
    <div class="options-row">
      <label>
        <input type="checkbox" id="rememberMe">
        <span>Remember Me</span>
      </label>
      <a href="/forgot-password.html" id="forgotLink">Forgot Password?</a>
    </div>

    <!-- Login Button -->
    <button class="btn-fire" id="loginBtn">
      <i class="fas fa-fire"></i> ENTER THE CLAN.
    </button>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
      <span style="color: var(--text-secondary); font-size: 0.8rem;">Authenticating...</span>
    </div>

    <!-- Message -->
    <div id="loginMessage" class="message"></div>

    <!-- Divider -->
    <div class="divider">OR CONTINUE WITH</div>

    <!-- Social Buttons -->
    <div class="social-buttons">
      <button class="social-btn" id="googleLogin" title="Login with Google">
        <i class="fab fa-google"></i>
      </button>
      <button class="social-btn" id="githubLogin" title="Login with GitHub">
        <i class="fab fa-github"></i>
      </button>
      <button class="social-btn" id="discordLogin" title="Login with Discord">
        <i class="fab fa-discord"></i>
      </button>
    </div>

    <!-- Register Link -->
    <div class="register-link">
      Don't have an account? <a href="/register.html">Join the Clan</a>
    </div>
  </div>
</div>

<!-- ==================== SCRIPTS ==================== -->
<script>
  // ============================================================
  // SCORPION X – LOGIN.JS
  // ============================================================

  // ==================== FIRE PARTICLES ====================
  const canvas = document.getElementById('fireParticles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 10,
      size: Math.random() * 3 + 1.5,
      speedY: Math.random() * 2.5 + 1.5,
      speedX: (Math.random() - 0.5) * 1.2,
      opacity: Math.random() * 0.6 + 0.2,
      color: ['#FF4500', '#FF6600', '#FFD700', '#FF0000', '#FF8C00'][Math.floor(Math.random() * 5)]
    };
  }

  for (let i = 0; i < 80; i++) {
    const p = createParticle();
    p.y = Math.random() * canvas.height;
    particles.push(p);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.shadowColor = '#FF4500';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      p.y -= p.speedY;
      p.x += p.speedX;
      if (p.y < -10) {
        Object.assign(p, createParticle());
        p.y = canvas.height + 10;
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // ==================== CURSOR GLOW ====================
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });
  if ('ontouchstart' in window) {
    cursorGlow.style.display = 'none';
  }

  // ==================== TOGGLE PASSWORD ====================
  document.getElementById('togglePassword').addEventListener('click', function() {
    const input = document.getElementById('password');
    const icon = this.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  // ==================== MESSAGE ====================
  function showMessage(container, msg, type) {
    const el = document.getElementById(container);
    el.textContent = msg;
    el.className = 'message ' + type;
    el.style.display = 'block';
    setTimeout(() => {
      if (el.textContent === msg) {
        el.style.display = 'none';
      }
    }, 5000);
  }

  // ==================== LOGIN ====================
  const loginBtn = document.getElementById('loginBtn');
  const loadingSpinner = document.getElementById('loadingSpinner');

  loginBtn.addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;

    // Validate
    if (!email) {
      showMessage('loginMessage', '❌ Please enter your email address.', 'error');
      return;
    }
    if (!email.endsWith('@gmail.com')) {
      showMessage('loginMessage', '❌ Only @gmail.com addresses are allowed.', 'error');
      return;
    }
    if (!password || password.length < 6) {
      showMessage('loginMessage', '❌ Please enter your password.', 'error');
      return;
    }

    // Show loading
    loginBtn.disabled = true;
    loginBtn.style.display = 'none';
    loadingSpinner.classList.add('active');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, remember })
      });
      const data = await res.json();

      if (data.success && data.token) {
        // Store token
        if (remember) {
          localStorage.setItem('authToken', data.token);
        } else {
          sessionStorage.setItem('authToken', data.token);
        }
        showMessage('loginMessage', '✅ Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1200);
      } else if (data.pendingApproval) {
        showMessage('loginMessage', '⏳ Account pending admin approval. You will receive an email once approved.', 'info');
        loginBtn.disabled = false;
        loginBtn.style.display = 'block';
        loadingSpinner.classList.remove('active');
      } else {
        showMessage('loginMessage', `❌ ${data.message || 'Invalid credentials'}`, 'error');
        loginBtn.disabled = false;
        loginBtn.style.display = 'block';
        loadingSpinner.classList.remove('active');
      }
    } catch (err) {
      showMessage('loginMessage', '❌ Server error. Please try again later.', 'error');
      loginBtn.disabled = false;
      loginBtn.style.display = 'block';
      loadingSpinner.classList.remove('active');
    }
  });

  // ==================== ENTER KEY ====================
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loginBtn.click();
      }
    });
  });

  // ==================== SOCIAL LOGIN PLACEHOLDERS ====================
  document.getElementById('googleLogin').addEventListener('click', () => {
    showMessage('loginMessage', '🔐 Google login coming soon!', 'info');
  });
  document.getElementById('githubLogin').addEventListener('click', () => {
    showMessage('loginMessage', '🔐 GitHub login coming soon!', 'info');
  });
  document.getElementById('discordLogin').addEventListener('click', () => {
    showMessage('loginMessage', '🔐 Discord login coming soon!', 'info');
  });

  // ==================== FORGOT PASSWORD LINK ====================
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    // Smooth transition to forgot password
    document.querySelector('.container').style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => {
      window.location.href = '/forgot-password.html';
    }, 300);
  });

  // ==================== AUTO FILL EMAIL FROM URL ====================
  (function autoFillEmail() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    if (email) {
      document.getElementById('email').value = email;
    }
  })();

  // ==================== SESSION CHECK ====================
  (async function checkExistingSession() {
    const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
    if (token) {
      try {
        const res = await fetch('/api/verify-session', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          // Already logged in, redirect to dashboard
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        // Token invalid, continue to login
        localStorage.removeItem('authToken');
        sessionStorage.removeItem('authToken');
      }
    }
  })();
</script>
</body>
</html>
