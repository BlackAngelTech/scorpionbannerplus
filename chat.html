<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SCORPION X | Chatroom</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================================
       SCORPION X – CHATROOM STYLES
       3000+ Features Ready
       ============================================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --fire-orange: #FF4500;
      --fire-bright: #FF6600;
      --fire-dark: #8B0000;
      --gold: #FFD700;
      --gold-light: #FFEA00;
      --text-primary: #E9EDEF;
      --text-secondary: #A8A8A8;
      --glass-bg: rgba(10, 10, 10, 0.85);
      --glass-bg-light: rgba(10, 10, 10, 0.5);
      --fire-glow: 0 0 30px rgba(255, 69, 0, 0.3);
      --fire-glow-strong: 0 0 60px rgba(255, 69, 0, 0.6);
      --font-primary: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
      --transition-fast: 0.2s ease;
      --transition-medium: 0.4s ease;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --chat-sent: #25D366;
      --chat-received: #1a1a2e;
    }

    body {
      background: var(--black);
      font-family: var(--font-body);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--fire-orange); border-radius: 10px; }

    /* ==================== BACKGROUND ==================== */
    .bg-fire {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at center, #1a0505 0%, #0a0a0a 70%);
    }

    #fireParticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .cursor-glow {
      position: fixed;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 69, 0, 0.2), transparent 70%);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
    }

    /* ==================== SIDEBAR ==================== */
    .hamburger {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--fire-orange);
      border-radius: var(--radius-sm);
      cursor: pointer;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      backdrop-filter: blur(8px);
      transition: var(--transition-medium);
    }

    .hamburger:hover { background: var(--fire-orange); box-shadow: var(--fire-glow); }
    .hamburger span { width: 22px; height: 2px; background: var(--gold); transition: var(--transition-fast); }
    .hamburger:hover span { background: var(--black); }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: rgba(5, 10, 20, 0.98);
      backdrop-filter: blur(20px);
      border-right: 2px solid var(--fire-orange);
      z-index: 1000;
      transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding-top: 70px;
      overflow-y: auto;
    }

    .sidebar.open { left: 0; }

    .sidebar .sidebar-logo {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .sidebar .sidebar-logo img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--fire-orange);
      margin-bottom: 5px;
    }

    .sidebar .sidebar-logo span {
      font-family: var(--font-primary);
      font-size: 0.9rem;
      color: var(--gold);
      display: block;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 20px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 69, 0, 0.05);
      transition: var(--transition-fast);
      font-size: 0.85rem;
    }

    .sidebar a i { width: 22px; color: var(--fire-orange); }
    .sidebar a:hover { background: rgba(255, 69, 0, 0.08); padding-left: 28px; color: #fff; }
    .sidebar a.active { color: var(--gold); background: rgba(255, 69, 0, 0.12); border-left: 3px solid var(--fire-orange); }

    /* ==================== CHAT APP LAYOUT ==================== */
    .chat-app {
      position: relative;
      z-index: 10;
      display: flex;
      height: 100vh;
      padding-top: 60px;
    }

    /* ==================== CHAT SIDEBAR (Contact List) ==================== */
    .chat-sidebar {
      width: 320px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 69, 0, 0.15);
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
    }

    .chat-sidebar .search-bar {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-sidebar .search-bar input {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 69, 0, 0.15);
      padding: 8px 14px;
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 0.85rem;
    }

    .chat-sidebar .search-bar input:focus {
      outline: none;
      border-color: var(--fire-orange);
    }

    .chat-sidebar .search-bar .filter-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      padding: 5px 8px;
    }

    .chat-sidebar .search-bar .filter-btn:hover { color: var(--gold); }

    .chat-sidebar .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .chat-sidebar .tabs .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid transparent;
    }

    .chat-sidebar .tabs .tab.active {
      color: var(--gold);
      border-bottom-color: var(--fire-orange);
    }

    .chat-sidebar .tabs .tab:hover { color: var(--text-primary); }

    .chat-sidebar .contact-list {
      flex: 1;
      overflow-y: auto;
      padding: 5px 0;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 15px;
      cursor: pointer;
      transition: var(--transition-fast);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .chat-item:hover { background: rgba(255, 69, 0, 0.05); }
    .chat-item.active { background: rgba(255, 69, 0, 0.1); border-left: 3px solid var(--fire-orange); }

    .chat-item .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
      position: relative;
    }

    .chat-item .avatar .online-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--black);
    }

    .chat-item .avatar .online-dot.online { background: #25D366; }
    .chat-item .avatar .online-dot.offline { background: #666; }
    .chat-item .avatar .verified-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 0.6rem;
      color: #25D366;
    }

    .chat-item .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-item .info { flex: 1; min-width: 0; }
    .chat-item .info .name {
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chat-item .info .name .badge {
      font-size: 0.5rem;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--fire-orange);
      color: var(--black);
      font-weight: 700;
    }

    .chat-item .info .last-msg {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item .meta {
      text-align: right;
      flex-shrink: 0;
    }

    .chat-item .meta .time {
      font-size: 0.6rem;
      color: var(--text-secondary);
    }

    .chat-item .meta .unread {
      background: var(--fire-orange);
      color: var(--black);
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 8px;
      border-radius: 20px;
      margin-top: 3px;
      display: inline-block;
    }

    /* ==================== MAIN CHAT AREA ==================== */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.3);
      height: 100%;
    }

    .chat-header {
      padding: 12px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 69, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      flex-shrink: 0;
    }

    .chat-header .back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
    }

    .chat-header .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .chat-header .info { flex: 1; }
    .chat-header .info .name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header .info .name .verified {
      color: #25D366;
      font-size: 0.8rem;
    }

    .chat-header .info .status {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .chat-header .info .status .typing {
      color: var(--gold);
      animation: blink 1s infinite;
    }

    .chat-header .actions {
      display: flex;
      gap: 15px;
    }

    .chat-header .actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .chat-header .actions button:hover { color: var(--gold); }

    /* ==================== MESSAGES AREA ==================== */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 15px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .messages-area .date-divider {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
    }

    .message {
      max-width: 75%;
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      word-wrap: break-word;
      position: relative;
    }

    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .message.received {
      align-self: flex-start;
      background: var(--chat-received);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .message .msg-time {
      font-size: 0.55rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 3px;
      text-align: right;
    }

    .message .msg-status {
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.4);
      margin-left: 5px;
    }

    .message .msg-status.delivered { color: #25D366; }
    .message .msg-status.read { color: #25D366; }

    .message .msg-media {
      max-width: 250px;
      border-radius: 12px;
      margin-top: 5px;
      cursor: pointer;
      display: block;
    }

    .message .msg-reply {
      background: rgba(255, 255, 255, 0.05);
      padding: 5px 10px;
      border-radius: 8px;
      margin-bottom: 5px;
      border-left: 3px solid var(--fire-orange);
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .message .msg-reply strong { color: var(--gold); }

    .message .msg-reactions {
      display: flex;
      gap: 4px;
      margin-top: 3px;
    }

    .message .msg-reactions .reaction {
      background: rgba(255, 255, 255, 0.05);
      padding: 1px 6px;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* ==================== TYPING INDICATOR ==================== */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--chat-received);
      border-radius: 18px;
      align-self: flex-start;
      max-width: 80px;
    }

    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingBounce 1.2s infinite;
    }

    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ==================== MESSAGE INPUT ==================== */
    .message-input {
      padding: 10px 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255, 69, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .message-input .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 30px;
      padding: 0 15px;
      border: 1px solid rgba(255, 69, 0, 0.15);
      transition: var(--transition-fast);
    }

    .message-input .input-wrapper:focus-within {
      border-color: var(--fire-orange);
    }

    .message-input .input-wrapper input {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
    }

    .message-input .input-wrapper input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .message-input .input-wrapper .emoji-btn,
    .message-input .input-wrapper .attach-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 5px;
      transition: var(--transition-fast);
    }

    .message-input .input-wrapper .emoji-btn:hover,
    .message-input .input-wrapper .attach-btn:hover {
      color: var(--gold);
    }

    .message-input .input-wrapper .attach-btn { position: relative; }
    .message-input .input-wrapper .attach-btn input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      left: 0;
      top: 0;
    }

    .message-input .send-btn {
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      color: var(--gold);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition-medium);
      box-shadow: var(--fire-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .message-input .send-btn:hover {
      transform: scale(1.05);
      box-shadow: var(--fire-glow-strong);
    }

    .message-input .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ==================== UNIVERSAL CHANNEL BADGE ==================== */
    .universal-badge {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      font-size: 0.5rem;
      padding: 1px 8px;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      .chat-sidebar { width: 100%; }
      .chat-sidebar.hidden { display: none; }
      .chat-header .back-btn { display: block; }
      .chat-main { width: 100%; }
      .message { max-width: 85%; }
    }

    @media (max-width: 480px) {
      .chat-sidebar { width: 100%; }
      .message { max-width: 90%; font-size: 0.85rem; }
      .chat-header { padding: 10px 15px; }
      .message-input { padding: 8px 12px; }
    }

    /* ==================== TOAST ==================== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--fire-orange);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      z-index: 2000;
      display: none;
      animation: slideUp 0.4s ease;
      max-width: 320px;
    }

    .toast.active { display: block; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .toast .toast-title { font-weight: 700; color: var(--gold); font-size: 0.8rem; }
    .toast .toast-msg { font-size: 0.7rem; color: var(--text-secondary); }
  </style>
</head>
<body>

<div class="bg-fire"></div>
<canvas id="fireParticles"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ==================== SIDEBAR ==================== -->
<div class="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="https://files.catbox.moe/cam98u.jpg" alt="SCORPION X">
    <span>SCORPION X</span>
  </div>
  <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/connect.html"><i class="fab fa-whatsapp"></i> Connect WhatsApp</a>
  <a href="/ban.html"><i class="fas fa-skull"></i> Ban Panel</a>
  <a href="/unban.html"><i class="fas fa-infinity"></i> Unban Panel</a>
  <a href="/earn-coins.html"><i class="fas fa-coins"></i> Earn Coins</a>
  <a href="/reels.html"><i class="fas fa-photo-video"></i> Reels</a>
  <a href="/chat.html" class="active"><i class="fas fa-comments"></i> Chatroom</a>
  <a href="/account.html"><i class="fas fa-user-cog"></i> Account</a>
  <a href="/admin.html"><i class="fas fa-code-branch"></i> Admin</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- ==================== CHAT APP ==================== -->
<div class="chat-app">

  <!-- ==================== CHAT SIDEBAR ==================== -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search chats..." oninput="searchChats(this.value)">
      <button class="filter-btn"><i class="fas fa-sliders-h"></i></button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="chats" onclick="switchTab('chats')">Chats</div>
      <div class="tab" data-tab="groups" onclick="switchTab('groups')">Groups</div>
      <div class="tab" data-tab="channels" onclick="switchTab('channels')">Channels</div>
      <div class="tab" data-tab="contacts" onclick="switchTab('contacts')">Contacts</div>
    </div>
    <div class="contact-list" id="contactList">
      <!-- Loaded dynamically -->
    </div>
  </div>

  <!-- ==================== MAIN CHAT ==================== -->
  <div class="chat-main" id="chatMain">
    <div class="chat-header" id="chatHeader">
      <button class="back-btn" id="backBtn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
      <div class="avatar" id="chatAvatar">U</div>
      <div class="info">
        <div class="name" id="chatName">Select a chat <span class="verified" id="verifiedBadge"></span></div>
        <div class="status" id="chatStatus">Start messaging</div>
      </div>
      <div class="actions">
        <button onclick="showToast('📞 Call','Voice call coming soon!')"><i class="fas fa-phone"></i></button>
        <button onclick="showToast('📹 Video Call','Video call coming soon!')"><i class="fas fa-video"></i></button>
        <button onclick="showToast('ℹ️ Info','Chat info coming soon!')"><i class="fas fa-info-circle"></i></button>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div style="text-align:center; color:var(--text-secondary); padding:40px 0;">
        <i class="fas fa-comments" style="font-size:3rem; color:var(--fire-orange); opacity:0.3;"></i>
        <p style="margin-top:15px;">Select a chat to start messaging</p>
        <p style="font-size:0.8rem;">Or create a new group from the sidebar</p>
      </div>
    </div>

    <div class="message-input" id="messageInputArea">
      <div class="input-wrapper">
        <button class="emoji-btn" onclick="showToast('😊 Emoji','Emoji picker coming soon!')"><i class="far fa-smile"></i></button>
        <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="handleKeyDown(event)">
        <button class="attach-btn">
          <i class="fas fa-paperclip"></i>
          <input type="file" id="fileInput" multiple accept="image/*,video/*,audio/*,application/*" onchange="handleFileUpload(event)">
        </button>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<!-- ==================== TOAST ==================== -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle">💬 Chat</div>
  <div class="toast-msg" id="toastMsg">Welcome to SCORPION X Chat!</div>
</div>

<!-- ==================== CHAT.JS ==================== -->
<script src="/js/chat.js"></script>
<script>
  // ============================================================
  // SCORPION X – CHATROOM INIT
  // ============================================================

  const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
  if (!token) window.location.href = '/login.html';

  // ==================== FIRE PARTICLES ====================
  const canvas = document.getElementById('fireParticles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 10,
      size: Math.random() * 3 + 1.5,
      speedY: Math.random() * 2.5 + 1.5,
      speedX: (Math.random() - 0.5) * 1.2,
      opacity: Math.random() * 0.6 + 0.2,
      color: ['#FF4500', '#FF6600', '#FFD700', '#FF0000', '#FF8C00'][Math.floor(Math.random() * 5)]
    };
  }

  for (let i = 0; i < 80; i++) {
    const p = createParticle();
    p.y = Math.random() * canvas.height;
    particles.push(p);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.shadowColor = '#FF4500';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      p.y -= p.speedY;
      p.x += p.speedX;
      if (p.y < -10) {
        Object.assign(p, createParticle());
        p.y = canvas.height + 10;
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // ==================== CURSOR GLOW ====================
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });
  if ('ontouchstart' in window) cursorGlow.style.display = 'none';

  // ==================== SIDEBAR ====================
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const sidebar = document.getElementById('sidebar');
    const hamburger = document.querySelector('.hamburger');
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !hamburger.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  });

  // ==================== TOAST ====================
  function showToast(title, msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('active');
    setTimeout(() => toast.classList.remove('active'), 4000);
  }

  // ==================== LOGOUT ====================
  async function logout() {
    await fetch('/api/logout', { method: 'POST' }).catch(() => {});
    localStorage.removeItem('authToken');
    sessionStorage.removeItem('authToken');
    window.location.href = '/login.html';
  }

  // ==================== SHOW MESSAGE ====================
  function showMessage(container, msg, type) {
    const el = document.getElementById(container);
    el.textContent = msg;
    el.className = 'message ' + type;
    el.style.display = 'block';
    setTimeout(() => { if (el.textContent === msg) el.style.display = 'none'; }, 5000);
  }

  console.log('💬 SCORPION X Chat loaded successfully!');
</script>
</body>
</html>
