<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SCORPION X | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================================
       SCORPION X – FORGOT PASSWORD STYLES
       Theme: Fire / Mortal Kombat / Dark Cyberpunk
       ============================================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --fire-orange: #FF4500;
      --fire-bright: #FF6600;
      --fire-dark: #8B0000;
      --gold: #FFD700;
      --gold-light: #FFEA00;
      --text-primary: #E9EDEF;
      --text-secondary: #A8A8A8;
      --glass-bg: rgba(10, 10, 10, 0.75);
      --fire-glow: 0 0 30px rgba(255, 69, 0, 0.4);
      --fire-glow-strong: 0 0 60px rgba(255, 69, 0, 0.8);
      --font-primary: 'Orbitron', monospace;
      --font-body: 'Rajdhani', sans-serif;
      --transition-fast: 0.2s ease;
      --transition-medium: 0.4s ease;
      --transition-slow: 0.8s ease;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--black);
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow-y: auto;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ==================== SCROLLBAR ==================== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--black);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--fire-orange);
      border-radius: 10px;
    }

    /* ==================== BACKGROUND ==================== */
    .bg-fire {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at center, #1a0505 0%, #0a0a0a 70%);
    }

    .bg-fire::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(0deg, rgba(255, 69, 0, 0.08), transparent);
      animation: firePulse 3s ease-in-out infinite;
    }

    @keyframes firePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ==================== FIRE PARTICLES ==================== */
    #fireParticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ==================== CURSOR GLOW ==================== */
    .cursor-glow {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 69, 0, 0.25), transparent 70%);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
    }

    /* ==================== CONTAINER ==================== */
    .container {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 20px auto;
      padding: 20px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-30px); }
    }

    /* ==================== LOGO ==================== */
    .logo-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-container img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--fire-orange);
      box-shadow: var(--fire-glow);
      object-fit: cover;
      animation: pulseGlow 2s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 20px rgba(255, 69, 0, 0.4); }
      100% { box-shadow: 0 0 50px rgba(255, 69, 0, 0.8); }
    }

    .logo-container h1 {
      font-family: var(--font-primary);
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--fire-orange), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 8px;
      letter-spacing: 3px;
    }

    .logo-container .subtitle {
      font-family: var(--font-primary);
      font-size: 0.8rem;
      color: var(--text-secondary);
      letter-spacing: 4px;
    }

    /* ==================== GLASS CARD ==================== */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 69, 0, 0.25);
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    /* ==================== FORM ELEMENTS ==================== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 69, 0, 0.25);
      padding: 14px 16px;
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font-body);
      transition: var(--transition-fast);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--fire-orange);
      box-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .form-group input.error {
      border-color: #ff4444;
      box-shadow: 0 0 15px rgba(255, 68, 68, 0.2);
    }

    .form-group input.success {
      border-color: #25D366;
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.2);
    }

    .form-group .input-icon {
      position: absolute;
      right: 16px;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: var(--transition-fast);
    }

    /* ==================== BUTTONS ==================== */
    .btn-fire {
      font-family: var(--font-primary);
      padding: 14px 35px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      transition: var(--transition-medium);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(135deg, var(--fire-orange), var(--fire-dark));
      color: var(--gold);
      box-shadow: var(--fire-glow);
    }

    .btn-fire:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: var(--fire-glow-strong);
    }

    .btn-fire:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-secondary);
      box-shadow: none;
      margin-top: 12px;
    }

    .btn-outline:hover {
      border-color: var(--fire-orange);
      color: var(--text-primary);
    }

    /* ==================== BACK TO LOGIN ==================== */
    .back-link {
      text-align: center;
      margin-top: 18px;
    }

    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      transition: var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-link a:hover {
      color: var(--gold);
    }

    /* ==================== MESSAGE ==================== */
    .message {
      margin-top: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      display: none;
    }

    .message.error {
      display: block;
      color: #ff6666;
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.2);
    }

    .message.success {
      display: block;
      color: #66ff66;
      background: rgba(37, 211, 102, 0.1);
      border: 1px solid rgba(37, 211, 102, 0.2);
    }

    .message.info {
      display: block;
      color: var(--gold);
      background: rgba(255, 215, 0, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    /* ==================== SUCCESS ANIMATION ==================== */
    .success-icon {
      display: none;
      text-align: center;
      font-size: 4rem;
      color: #25D366;
      margin-bottom: 15px;
      animation: scaleIn 0.6s ease;
    }

    .success-icon.active {
      display: block;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ==================== LOADING SPINNER ==================== */
    .loading-spinner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 0;
    }

    .loading-spinner.active {
      display: flex;
    }

    .loading-spinner .spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--fire-orange);
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 600px) {
      .container {
        padding: 10px;
        margin: 10px auto;
      }

      .glass-card {
        padding: 20px 15px;
      }

      .logo-container img {
        width: 65px;
        height: 65px;
      }

      .logo-container h1 {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 400px) {
      .glass-card {
        padding: 15px 12px;
      }

      .btn-fire {
        font-size: 0.85rem;
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

<!-- ==================== BACKGROUND ==================== -->
<div class="bg-fire"></div>
<canvas id="fireParticles"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ==================== CONTAINER ==================== -->
<div class="container">

  <!-- Logo -->
  <div class="logo-container">
    <img src="https://files.catbox.moe/cam98u.jpg" alt="SCORPION X">
    <h1>SCORPION X</h1>
    <div class="subtitle">⚔ RESET PASSWORD ⚔</div>
  </div>

  <!-- Glass Card -->
  <div class="glass-card">

    <!-- Success Icon -->
    <div class="success-icon" id="successIcon">
      <i class="fas fa-check-circle"></i>
    </div>

    <p style="text-align:center; color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem;">
      Enter your Gmail address and we'll send you a <span style="color: var(--gold);">reset link</span>.
    </p>

    <!-- Email -->
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="youremail@gmail.com" autocomplete="email">
        <span class="input-icon" id="emailIcon"><i class="fas fa-envelope"></i></span>
      </div>
    </div>

    <!-- Send Button -->
    <button class="btn-fire" id="sendBtn">
      <i class="fas fa-paper-plane"></i> SEND RESET LINK
    </button>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
      <span style="color: var(--text-secondary); font-size: 0.8rem;">Sending link...</span>
    </div>

    <!-- Message -->
    <div id="resetMessage" class="message"></div>

    <!-- Back to Login -->
    <div class="back-link">
      <a href="/login.html">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>

    <!-- Divider -->
    <div class="divider" style="display:flex; align-items:center; gap:15px; margin:20px 0 0; color:var(--text-secondary); font-size:0.8rem;">
      <span style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></span>
      <span>Need help?</span>
      <span style="flex:1; height:1px; background:rgba(255,255,255,0.1);"></span>
    </div>

    <!-- Support -->
    <p style="text-align:center; font-size:0.75rem; color: var(--text-secondary); margin-top:15px;">
      <i class="fas fa-headset"></i> Contact support at <a href="mailto:support@scorpionx.com" style="color:var(--fire-orange); text-decoration:none;">https:/t.me/digital_darlingx</a>
    </p>
  </div>
</div>

<!-- ==================== SCRIPTS ==================== -->
<script>
  // ============================================================
  // SCORPION X – FORGOT PASSWORD.JS
  // ============================================================

  // ==================== FIRE PARTICLES ====================
  const canvas = document.getElementById('fireParticles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 10,
      size: Math.random() * 3 + 1.5,
      speedY: Math.random() * 2.5 + 1.5,
      speedX: (Math.random() - 0.5) * 1.2,
      opacity: Math.random() * 0.6 + 0.2,
      color: ['#FF4500', '#FF6600', '#FFD700', '#FF0000', '#FF8C00'][Math.floor(Math.random() * 5)]
    };
  }

  for (let i = 0; i < 80; i++) {
    const p = createParticle();
    p.y = Math.random() * canvas.height;
    particles.push(p);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.shadowColor = '#FF4500';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      p.y -= p.speedY;
      p.x += p.speedX;
      if (p.y < -10) {
        Object.assign(p, createParticle());
        p.y = canvas.height + 10;
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // ==================== CURSOR GLOW ====================
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });
  if ('ontouchstart' in window) {
    cursorGlow.style.display = 'none';
  }

  // ==================== MESSAGE ====================
  function showMessage(container, msg, type) {
    const el = document.getElementById(container);
    el.textContent = msg;
    el.className = 'message ' + type;
    el.style.display = 'block';
    setTimeout(() => {
      if (el.textContent === msg) {
        el.style.display = 'none';
      }
    }, 5000);
  }

  // ==================== SEND RESET LINK ====================
  const sendBtn = document.getElementById('sendBtn');
  const loadingSpinner = document.getElementById('loadingSpinner');
  const successIcon = document.getElementById('successIcon');

  sendBtn.addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();

    // Validate
    if (!email) {
      showMessage('resetMessage', '❌ Please enter your email address.', 'error');
      return;
    }
    if (!email.endsWith('@gmail.com')) {
      showMessage('resetMessage', '❌ Only @gmail.com addresses are allowed.', 'error');
      return;
    }

    // Show loading
    sendBtn.disabled = true;
    sendBtn.style.display = 'none';
    loadingSpinner.classList.add('active');
    successIcon.classList.remove('active');

    try {
      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      if (data.success) {
        // Show success
        loadingSpinner.classList.remove('active');
        successIcon.classList.add('active');
        showMessage('resetMessage', '✅ Reset link sent! Check your Gmail inbox.', 'success');
        document.getElementById('email').value = '';

        // Reset button after delay
        setTimeout(() => {
          successIcon.classList.remove('active');
          sendBtn.disabled = false;
          sendBtn.style.display = 'block';
          document.getElementById('resetMessage').style.display = 'none';
        }, 5000);
      } else {
        loadingSpinner.classList.remove('active');
        sendBtn.disabled = false;
        sendBtn.style.display = 'block';
        showMessage('resetMessage', `❌ ${data.message || 'Email not found.'}`, 'error');
      }
    } catch (err) {
      loadingSpinner.classList.remove('active');
      sendBtn.disabled = false;
      sendBtn.style.display = 'block';
      showMessage('resetMessage', '❌ Server error. Please try again later.', 'error');
    }
  });

  // ==================== ENTER KEY ====================
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendBtn.click();
    }
  });

  // ==================== AUTO FILL EMAIL FROM URL ====================
  (function autoFillEmail() {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    if (email) {
      document.getElementById('email').value = email;
    }
  })();

  // ==================== SESSION CHECK ====================
  (async function checkSession() {
    const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
    if (token) {
      try {
        const res = await fetch('/api/verify-session', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
          // Already logged in, redirect to dashboard
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        // Token invalid, continue
      }
    }
  })();
</script>
</body>
</html>
